<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Escuela Bíblica Dominical</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:auto;
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input, select, button{

width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;

}

button{
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1a5bb8;
}

.hidden{
display:none;
}

.menu button{
margin-top:5px;
}

</style>

</head>
<body>


<!-- LOGIN -->

<div class="container" id="loginContainer">

<h2>Escuela Bíblica Dominical</h2>

<input type="email" id="email" placeholder="Correo">

<input type="password" id="password" placeholder="Contraseña">

<select id="rol">
<option value="">Seleccione rol</option>
<option value="maestro">Maestro</option>
<option value="auxiliar">Auxiliar</option>
<option value="logistica">Logística</option>
</select>

<input type="text" id="nombreCompleto" placeholder="Nombre completo">

<select id="campo">
<option value="">Seleccione campo</option>
<option>La Isla</option>
<option>Las Delicias</option>
<option>El Amatal</option>
<option>Buenos Aires</option>
<option>Corozal 1</option>
<option>El Porvenir</option>
<option>El Cauloté</option>
<option>Corozal 2</option>
<option>Valle Encantado</option>
<option>La Playa</option>
</select>

<button id="btnLogin">Entrar</button>

<button id="btnRegistro">Registrarse</button>

</div>


<!-- MENU PRINCIPAL -->

<div class="container hidden" id="menuContainer">

<h2>Panel Principal</h2>

<div id="resumen">

<h3>Resumen de asistencia</h3>

<p>Presentes: <span id="presentes">0</span></p>

<p>Ausentes: <span id="ausentes">0</span></p>

<p>Permiso: <span id="permiso">0</span></p>

</div>


<div class="menu">

<button onclick="mostrarAgregarAlumno()">

Agregar Alumno

</button>


<button onclick="mostrarAsistencia()">

Pasar Asistencia

</button>


<button onclick="cerrarSesion()">

Cerrar Sesión

</button>

</div>

</div>


<!-- AGREGAR ALUMNO -->

<div class="container hidden" id="alumnoContainer">

<h3>Agregar Alumno</h3>

<input id="nombreAlumno" placeholder="Nombre">

<input id="edadAlumno" type="number" placeholder="Edad">

<input id="fechaAlumno" type="date">

<select id="campoAlumno">

<option value="">Seleccione campo</option>

<option>La Isla</option>
<option>Las Delicias</option>
<option>El Amatal</option>
<option>Buenos Aires</option>
<option>Corozal 1</option>
<option>El Porvenir</option>
<option>El Cauloté</option>
<option>Corozal 2</option>
<option>Valle Encantado</option>
<option>La Playa</option>

</select>

<button id="btnGuardarAlumno">

Guardar Alumno

</button>

<button onclick="volverMenu()">

Volver

</button>

</div>


<!-- ASISTENCIA -->

<div class="container hidden" id="asistenciaContainer">

<h3>Pasar Asistencia</h3>

<button id="btnPasarAsistencia">

Registrar Asistencia

</button>

<button onclick="volverMenu()">

Volver

</button>

</div>


<script type="module" src="./app.js"></script>


<script>

function mostrarAgregarAlumno(){

ocultarTodo()
document.getElementById("alumnoContainer").classList.remove("hidden")

}

function mostrarAsistencia(){

ocultarTodo()
document.getElementById("asistenciaContainer").classList.remove("hidden")

}

function volverMenu(){

ocultarTodo()
document.getElementById("menuContainer").classList.remove("hidden")

}

function cerrarSesion(){

location.reload()

}

function ocultarTodo(){

document.getElementById("menuContainer").classList.add("hidden")
document.getElementById("alumnoContainer").classList.add("hidden")
document.getElementById("asistenciaContainer").classList.add("hidden")

}

</script>


</body>
</html>
